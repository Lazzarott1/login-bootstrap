<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Simples</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <main class="d-flex align-items-center justify-content-center vh-100">
        <div class="container" style="max-width: 400px;">

            <div class="card p-4 shadow">
                <h2 id="titulo" class="text-center mb-4">Login</h2>

                <form id="form-login">

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Email" required>
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" id="senha" class="form-control" placeholder="Senha" required>
                    </div>

                    <button id="button" type="submit" class="btn btn-primary w-100">
                        Entrar
                    </button>
                </form>

                <div id="mensagem" class="mt-3"></div>

                <div class="text-center mt-3">
                    <span id="texto-toggle">Não tem conta? </span>
                    <span id="toggle" style="cursor: pointer; color: blue; text-decoration: underline;">
                        Cadastre-se
                    </span>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>

</body>

</html>
